"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$nodejs\
$lua\
$rust\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
format = "$path "

[git_branch]
symbol = "git:"
format = "$symbol$branch "

[git_state]
format = "($state $progress_current/$progress_total) "

[git_status]
format = "($all_status$ahead_behind) "
conflicted = "conflict:"
ahead = "ahead:${count}"
behind = "behind:${count}"
diverged = "diverged:${ahead_count}/${behind_count}"
untracked = "untracked:${count}"
stashed = "stashed:${count}"
modified = "modified:${count}"
staged = "staged:${count}"
renamed = "renamed:${count}"
deleted = "deleted:${count}"

[python]
symbol = "py:"
python_binary = "python3"
format = "$symbol$version ($virtualenv) "

[nodejs]
symbol = "node:"
format = "$symbol$version "

[lua]
symbol = "lua:"
format = "$symbol$version "

[rust]
symbol = "rust:"
format = "$symbol$version "

[cmd_duration]
min_time = 2000
format = "took $duration "

[character]
success_symbol = "> "
error_symbol = "! "

# Disable noisy modules
[package]
disabled = true

[aws]
disabled = true

[azure]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[container]
disabled = true

[os]
disabled = true

[shell]
disabled = true

[username]
disabled = true

[hostname]
disabled = true

[time]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true
